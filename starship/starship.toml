scan_timeout = 10
command_timeout = 1500
# Add environment caching for faster reuse

format = """$directory\
${custom.jj}\
$git_branch\
$git_commit\
$git_state\
$git_status\
$line_break\
$package\
$golang\
$nodejs\
$jobs\
$character"""

# format_right = """$all"""
palette = "catppuccin_mocha"

[character]
success_symbol = "[ŌØ»](bold green)"
error_symbol = "[ŌØ»](bold red)"

[directory]
style = "green"
truncation_length = 3
truncation_symbol = "ŌĆ”/"
truncate_to_repo = true
# fish_style_pwd_dir_length = 1

[git_state]
format = '[\($state( $progress_current of $progress_total)\) ]($style)'
style = 'bold teal'

[git_branch]
symbol = "’ä” "
style = 'sky'
format = """on [$symbol$branch(:$remote_branch)]($style) """
only_attached = true

[git_status]
conflicted = '[¾░Ć© ](red)'
ahead = "[¾░│Ī ](flamingo)"
behind = "[¾░│ø ](blue)"
diverged = "[¾░ĄÜ ](orange)"
untracked = "[¾░ŗŚ ](yellow)"
stashed = "[¾░ōÅ ](lavender)"
modified = "[¾░ø┐ ](peach)"
staged = "[¾░ÉŚ ](green)"
renamed = "[¾░üÖ ](rose)"
deleted = '[¾░ģÖ ](red)'
style = "overlay0"
format = '([$ahead_behind$all_status ]($style))'
ignore_submodules = true

[nodejs]
format = "[$symbol($version )]($style)"
detect_files = ["package.json"]
detect_folders = []
detect_extensions = []

[package]
format = "[’Æć $version ](flamingo)"

[jobs]
style = "surface2"

[golang]
symbol = "Ņś¦ "
detect_files = ["go.mod", "go.sum"]
detect_folders = []
detect_extensions = []

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

# No per-module disabled=true blocks needed: `format` above is an explicit
# allowlist, so modules not listed there never run.
[custom.jj]
command = '''
jj log --revisions @ --no-graph --ignore-working-copy --color always --limit 1 --template '
  separate(" ",
    change_id.shortest(4),
    bookmarks,
    "|",
    concat(
      if(conflict, "¾░Ć© "),
      if(divergent, "¾░ĄÜ "),
      if(hidden, "¾░śō "),
      if(immutable, "¾░īŠ "),
    ),
    raw_escape_sequence("\x1b[1;33m") ++ if(empty, "(empty)"),
    raw_escape_sequence("\x1b[1;37m") ++ coalesce(
      truncate_end(32, description.first_line(), "ŌĆ”"),
      "(no description set)",
    ) ++ raw_escape_sequence("\x1b[1;37m"),
  )
'
'''
when = '[ -d .jj ] || jj root --ignore-working-copy >/dev/null 2>&1'
ignore_timeout = false
description = "The current jj status"
symbol = "’ä” "
style = "bold lavender"
