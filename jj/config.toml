"$schema" = "https://jj-vcs.github.io/jj/latest/config-schema.json"

[user]
name = "Brad R"
email = "31802085+bnrobinson93@users.noreply.github.com"

[revsets]
log = "latest(curbranch::@, 30) | @::nextbranch | @ | @- | children(@) | ancestors(@, 3) | my_other_bookmarks | my_other_leaves | (bases & my_bookmark_ranges) | bases"
# 1. Current bookmark: full context near @
# 2. Other bookmarks I own: only their tips + my leaves on them
# 3. Keep bases that are relevant to my work, but *only* where my stuff lives

[revset-aliases]
'closest_bookmark(to)' = 'heads(::to & bookmarks() & ~trunk())'
'closest_pushable(to)' = 'heads(::to & mutable() & ~trunk() & ~description(exact:"") & (~empty() | merges()))'
'bases' = 'trunk() | present(develop) | present(feat/PEP-2386-dsp-v1-integration)'
'mybranches' = 'bookmarks() & mine()'
'branchesandheads' = 'mybranches | (heads(trunk()::) & mine())'
'curbranch' = 'latest(mybranches::@- & mybranches)'
'nextbranch' = 'roots(@:: & branchesandheads)'
'my_other_bookmarks' = 'mybranches & ~(curbranch::@)'
'my_other_bookmark_heads' = 'heads(my_other_bookmarks::)'
'my_leaves' = 'heads(mine() & mutable())'
'my_other_leaves' = 'my_leaves & my_other_bookmarks::'
'my_bookmark_ranges' = 'mybranches::'
'recent()' = 'committer_date(after:"1 month ago")'
'feature_branches()' = "bookmarks() ~ (trunk() | main)"
'current_feature_branch()' = "feature_branches() & ::@"
'other_feature_branches()' = "feature_branches() & ~::@"
'current_branch_history()' = "connected(main.. current_feature_branch()) | connected(main..@)"
'other_branches_summary()' = "ancestors(other_feature_branches(), 4) | descendants(other_feature_branches())"

[aliases]
my_log = ["log", "-T", "my_default_log"]
l = [
  "log",
  "-r",
  "latest(@ | ancestors(bookmarks(), 3) | ancestors(@, 15) | ancestors(trunk() | main, 3) | @::, 30)",
]
s = ["status"]
retrunk = ["rebase", "-d", "trunk()"]
lr = ["log", "-r", "recent()"]
e = ["edit"]
pull = ["git", "fetch"]
r = ["rebase"]
bc = ["bookmark", "create"]
bc- = ["bookmark", "create", "-r @-"]

tug- = [
  "bookmark",
  "move",
  "--from",
  "closest_bookmark(@-)",
  "--to",
  "closest_pushable(@-)",
]
tug = [
  "bookmark",
  "move",
  "--from",
  "closest_bookmark(@)",
  "--to",
  "closest_pushable(@)",
]
d = ["util", "exec", "--", "bash", "-c", """
set -o pipefail
jj diff --git "$@" | diffnav
""", "jj"]
check = ["util", "exec", "--", ".husky/pre-commit"]
push = [
  "util",
  "exec",
  "--",
  "bash",
  "-c",
  """
  # Format all mutable commits since origin before pushing
  #jj fix --source 'remote_bookmarks(remote=origin)..@ & mutable()'

  # Run pre-commit hook if it exists
  if [[ -f .husky/pre-commit ]]; then
    jj check || exit
  fi

  # Extract bookmark and push
  bookmark=$(jj log -r 'closest_pushable(@)' --no-graph -T 'bookmarks.join(" ")' | awk 'NR==1{gsub(/^\\*/,"",$1); gsub(/\\*$/, "", $1); print $1}')
  if [ -n "$bookmark" ]; then
    jj git push -b "$bookmark"
  else # no bookmark found; push current change
    jj git push -c@
  fi
  """,
]

[commit]
sign = true

[ui]
pager = "cat"
default-command = ["my_log"]
diff-editor = "nvim"
diff-formatter = ":git"
merge-editor = "nvim"

[merge-tools.nvim]
program = "nvim"
edit-args = ["-c", "DiffEditor $left $right"]
merge-args = [
  "-c",
  "let g:jj_diffconflicts_marker_length=$marker_length",
  "-c",
  "JJDiffConflicts!",
  "$output",
  "$base",
  "$left",
  "$right",
]
merge-tool-edits-conflict-markers = true

[merge-tools.vscode]
program = "code"
merge-args = ["--wait", "--merge", "$left", "$right", "$base", "$output"]
# VS Code reads the output file and behaves better if it's prepopulated with conflict
# markers. Unfortunately, it does not seem to be able to output conflict markers when
# the user only resolves some of the conflicts.
merge-tool-edits-conflict-markers = true


[colors]
signature = "blue"
unsigned = "cyan"
empty = "red"
tag = "red"
change_id = "#fab387"
"working_copy change_id" = "#b4befe"
commit_id = "#a6e3a1"
"working_copy commit_id" = "#a6e3a1"
timestamp = "green"
git_head = "#f9e2af"
author = "#94e2d5"
committer = "#94e2d5"
"working_copy author" = "#94e2d5"
"working_copy empty description placeholder" = "bright yellow"
"node working_copy" = "bright green"
"elided" = { fg = "#f2cdcd", italic = true }

[signing]
behavior = "own"
key = "~/.ssh/id_ed25519_GitHubSigning.pub"
backend = "ssh"

[core]
excludesfile = "~/.gitignore"

[signing.backends.ssh]
program = "ssh-sign-wrapper.sh"
allowed_signers = "~/.ssh/allowed_signers"

[git]
sign-on-push = true
private-commits = "description(glob:'wip:*') | description(glob:'private:*')"

[templates]
log = "builtin_log_compact"                        # or builtin_log_online
git_push_bookmark = '"temp/" ++ change_id.short()'

[template-aliases]
my_default_log = "change_id.shortest(8) ++ ' - ' ++ label('bookmark', if(bookmarks, '(' ++ bookmarks.join(', ') ++ ') ', '')) ++ if(description, truncate_end(30, description.first_line(), '…') ++ ' ') ++ if(empty, label('empty','(empty) '), '') ++ label('timestamp', '(' ++ committer.timestamp().ago() ++ ') ') ++ label('author', '<' ++ author.name() ++ '> ') ++ if(signature, label('signature', ' '), label('unsigned', ' '))"

[remotes.origin]
auto-track-bookmarks = "glob:*"

# Code formatting tools for jj fix
[fix.tools.gofmt]
command = ["gofmt"]
patterns = ["glob:'**/*.go'"]

[fix.tools.prettier]
command = ["jj-prettier", "$path"]
patterns = [
  "glob:'**/*.js'",
  "glob:'**/*.jsx'",
  "glob:'**/*.ts'",
  "glob:'**/*.tsx'",
  "glob:'**/*.json'",
  "glob:'**/*.md'",
  "glob:'**/values.yaml'",
  "glob:'**/values/*.yaml'",
  "glob:'**/*.css'",
  "glob:'**/*.scss'",
  "glob:'**/*.html'",
  "glob:'**/*.graphql'",
  "glob:'**/*.gql'",
]

[fix.tools.stylua]
command = ["jj-stylua", "$path"]
patterns = ["glob:'**/*.lua'"]
