# blacklist: regex patterns matched against session names
# filters jj-agent workspace dirs and the bare ~/Documents/code dir
blacklist = ["^code$", "-ai", "-exp$", "-orch"]

[[session]]
name = "Vault"
path = "~/Documents/Vault"
startup_command = "nvim"

[[session]]
name = "dotfiles"
path = "~/.dotfiles"
startup_command = "jj pull"

# code/* subdirs: pull, single window
[[wildcard]]
pattern = "~/Documents/code/*"
startup_command = "jj pull || git pull origin main || true"
