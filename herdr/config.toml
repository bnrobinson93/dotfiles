onboarding = false
# herdr configuration
# Place this file at ~/.config/herdr/config.toml
# show full config with prefix-? or herdr --default-config

[theme]
name = "terminal"

# Follow host terminal light/dark appearance and switch Herdr UI themes.
# Existing manual behavior is unchanged unless this is true.
auto_switch = false

[ui]
pane_gaps = true
show_agent_labels_on_pane_borders = true
prompt_new_tab_name = false

[keys]
split_vertical = "prefix+|"
split_horizontal = "prefix+-"
next_workspace = "prefix+ctrl+n"
previous_workspace = "prefix+ctrl+p"

# Sesh clone
[[keys.command]]
key = "ctrl+f"
type = "pane"
command = "herdr-select"
[[keys.command]]
key = "prefix+shift+c"
type = "pane"
command = "herdr-clone"
[[keys.command]]
key = "prefix+shift+l"
type = "plugin_action"
command = "third774.last-workspace.toggle"
description = "last workspace"

# quick spots
[[keys.command]]
key = "prefix+ctrl+d"
type = "shell"
description = "jump to dot files"
command = "herdr-workspace-at ~/.dotfiles"
[[keys.command]]
key = "prefix+ctrl+c"
description = "jump to code"
type = "shell"
command = "herdr-workspace-at ~/Documents/code"
[[keys.command]]
key = "prefix+ctrl+v"
description = "jump to Obsidian vault"
type = "shell"
command = "herdr-workspace-at ~/Documents/Vault"

# herdr plugin install NathanFlurry/herdr-plugin-jj-workspace
[[keys.command]]
key = "prefix+a"
type = "plugin_action"
command = "nathanflurry.jj-workspace.new"
description = "new jj workspace"
[[keys.command]]
key = "prefix+shift+a"
type = "plugin_action"
command = "nathanflurry.jj-workspace.new-tab"
description = "new jj workspace (in tab)"
[[keys.command]]
key = "prefix+d"
type = "plugin_action"
command = "nathanflurry.jj-workspace.remove"
description = "remove jj workspace"

# Check Hunk
[[keys.command]]
key = "prefix+h"
type = "plugin_action"
command = "yuucu.hunk.open-review"
description = "Hunk review"

[experimental]
# Experimental local Kitty graphics rendering for attached clients.
# Requires a Kitty graphics-compatible outer terminal.
kitty_graphics = true
# Save recent pane screen history across full server restarts.
pane_history = true
# Expose the focused pane's cursor to the outer terminal so macOS input
# methods keep tracking the candidate window when TUIs paint their own
# cursor (Claude Code, pi, codex). Trade-off: extra cursor visible for
# apps that hide it without painting a replacement (vim normal mode, etc.).
# reveal_hidden_cursor_for_cjk_ime = false
# Optional allow-list: only reveal for focused panes whose detected agent
# matches one of these names. Empty means apply to any focused pane.
# If the list contains no valid names, the reveal does not apply.
# Accepted: pi, claude, codex, gemini, cursor, devin, cline, opencode,
# copilot, kimi, kiro, droid, amp, grok, hermes, kilo, qodercli, qoder.
cjk_ime_agents = ["claude", "codex", "gemini", "opencode"]
# Cursor shape rendered when reveal_hidden_cursor_for_cjk_ime is true.

[advanced]
# Maximum scrollback buffer size in bytes retained per pane terminal.
# Matches Ghostty's default scrollback-limit behavior.
# scrollback_limit_bytes = 10000000

[ui.toast]
delivery = "off"

[ui.sound]
enabled = false
