source = ~/.config/omarchy/current/theme/hyprlock.conf

general {
    ignore_empty_input = true
}

background {
    monitor =
    color = $color
    path = ~/.config/omarchy/current/background
    blur_passes = 3
}

general {
    no_fade_in = false
    fade_in_time = 0.2
}

input-field {
    monitor =
    size = 650, 100
    position = 0, 0
    halign = center
    valign = center

    inner_color = $inner_color
    outer_color = $outer_color
    outline_thickness = 4

    font_family = Dank Mono Nerd Font Propo
    font_color = $font_color

    placeholder_text = Enter Password
    check_color = $check_color
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = 0
    shadow_passes = 0
    fade_on_empty = false
}

auth {
    fingerprint:enabled = false
}

animatinos { 
    enabled = true
    animation = fade, 5, 5.8, linear
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(LC_TIME=en_US.UTF-8 date +"%A, %B %d")"
    color = rgba(216, 222, 233, 0.90)
    font_size = 25
    position = 0, 350
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = rgba(216, 222, 233, 0.90)
    font_size = 120
    position = 0, 230
    halign = center
    valign = center
}

# Music info display
label {
    monitor =
    text = cmd[update:1000] songdetail
    color = rgba(255, 255, 255, 0.6)
    font_size = 18
    position = 0, 50
    halign = center
    valign = bottom
}

# Weather info
label {
    monitor =
    text = cmd[update:300000] echo "$(curl -s 'wttr.in/?format=%t+%C' | sed s/^+//)"
    color = rgba(255, 255, 255, 0.7)
    font_size = 16
    position = 50, 50
    halign = bottom
    valign = left
}

# Battery status
label {
    monitor =
    text = cmd[update:30000] echo "🔋 $(cat /sys/class/power_supply/BAT0/capacity)%"
    color = rgba(255, 255, 255, 0.8)
    font_size = 14
    position = -50, 50
    halign = right
    valign = bottom
}
