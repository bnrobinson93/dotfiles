# Extra autostart processes
#exec-once = uwsm-app -- my-service
exec-once = uwsm-app -- hyprsunset

windowrule {
  name = ticktick
  match:initial_title = ticktick\.com.*
  workspace = special:scratchpad silent
}
windowrule {
  name = google-messages
  match:initial_title = messages\.google\.com.*
  workspace = special:scratchpad silent
}
 
exec-once = helium-browser --app="https://ticktick.com/webapp"
exec-once = helium-browser --app="https://messages.google.com/web"

# On screen keyboard (swipe from bottom to reveal/hide)
exec-once = hyprpm reload -n && wvkbd-mobintl -L 256 --hidden --alpha 204

# Screen auto-rotate (accelerometer via iio-hyprland); lock toggle in waybar
exec-once = uwsm-app -- orientation start

# Notifications: swaync (SwayNotificationCenter) replaces mako. Omarchy's default
# autostart launches mako; kill it once up, then start swaync so it claims the bus.
exec-once = bash -c 'sleep 0.5; pkill -x mako; uwsm-app -- swaync'
