# Application bindings
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT ALT, M, Music TUI, exec, omarchy-launch-or-focus-tui cliamp
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian"
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password
bindd = ALT SHIFT, SPACE, Passwords, exec, uwsm-app -- 1password --quick-access

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT ALT, A, Claude, exec, omarchy-launch-webapp "https://claude.ai"
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://calendar.google.com/"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.shortwave.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT, N, Notion, exec, omarchy-launch-webapp "https://notion.so/"
bindd = SUPER SHIFT, G, Google Messages, exec, omarchy-launch-or-focus-webapp "https://messages.google.com/web"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu
bind = SUPER, D, exec, pkill -SIGUSR1 wayscriber

# Type by Voice
unbind = SUPER CTRL, X
bindd = SUPER ALT, V, Toggle dictation, exec, voxtype record toggle

# ============================================
# Function Key Bindings (F1-F12)
# ============================================

# F1-F5, F7 - Already working (brightness, volume, keyboard backlight)
# These are handled by the system automatically

# F6 - Touchpad toggle
bind = , XF86TouchpadToggle, exec, ~/.local/bin/toggle-touchpad.sh

# F8 - Send to scratchpad
unbind = SUPER, P
bind = SUPER, P, movetoworkspace, special:scratchpad

# F9 - Screen lock (sends Super+L)
bind = SUPER, L, exec, hyprlock

# F10 - Camera toggle
bind = , XF86WebCam, exec, ~/.local/bin/toggle-camera.sh

# F11 - Screenshot (sends Super+Shift+S)
bind = SUPER SHIFT, S, exec, grimblast copy area

# F12 - MyAsus key (optional - map to app launcher or leave unmapped)
bind = , XF86Launch1, exec, omarchy-menu

# Notifications: swaync replaced mako, so omarchy's default COMMA binds (makoctl based) are dead.
# Rebind them to swaync-client equivalents. -d toggles DND (default only enabled).
unbind = SUPER, COMMA
bindd = SUPER, COMMA, Dismiss last notification, exec, swaync-client --close-latest -sw
unbind = SUPER SHIFT, COMMA
bindd = SUPER SHIFT, COMMA, Dismiss all notifications, exec, swaync-client -C -sw
unbind = SUPER CTRL, COMMA
bindd = SUPER CTRL, COMMA, Toggle silencing notifications, exec, swaync-dnd-toggle
unbind = SUPER ALT, COMMA
bindd = SUPER ALT, COMMA, Invoke last notification, exec, swaync-client -a 0 -sw
unbind = SUPER SHIFT ALT, COMMA
bindd = SUPER SHIFT ALT, COMMA, Open notification center, exec, swaync-client -t -sw

# Pause idle locking (dim/screen-off still fire, lock skipped so 1Password + tasks survive)
# Overrides omarchy default SUPER+CTRL+I (was: omarchy-toggle-idle, which killed dim/off too)
unbind = SUPER CTRL, I
bindd = SUPER CTRL, I, Toggle idle lock, exec, if test -e /tmp/hypridle-nolock; then rm /tmp/hypridle-nolock; notify-send -u low "󱫖    Idle lock resumed"; else touch /tmp/hypridle-nolock; notify-send -u low "󰛊    Idle lock paused (dim/screen-off still active)"; fi
