# Makes hyprsunset do nothing to the screen by default
# Without this, the default applies some tint to the monitor
profile {
    time = 06:00
    identity = true
    temperature = 5000
    gamma = 1
}
profile {
    time = 07:00
    identity = true
    temperature = 6000
    gamma = 1
}

# To enable auto switch to nightlight, set in your .config/hypr/autostart:
# exec-once = uwsm app -- hyprsunset
# and use the following:
profile {
    time = 16:00
    temperature = 4000
    gamma = 1
}
profile {
    time = 17:00
    temperature = 4000
    gamma = 0.95
}
profile {
    time = 18:00
    temperature = 4000
    gamma = 0.85
}
profile {
    time = 18:30
    temperature = 3000
    gamma = 0.85
}
profile {
