general {
    lock_cmd = omarchy-system-lock                                   # lock screen and 1password
    before_sleep_cmd = OMARCHY_LOCK_ONLY=true omarchy-system-lock    # lock before suspend without scheduling display off
    after_sleep_cmd = sleep 1 && omarchy-system-wake                 # delay for PAM readiness, then turn on display
    inhibit_sleep = 3                                                # wait until screen is locked
}

# Idle ladder. AC state is read live at each timeout, so one config drives both:
#   On AC:      dim 5m  / screen off 10m / lock 15m
#   On battery: dim 1m  / screen off  5m / lock 10m
# SUPER+CTRL+I toggles /tmp/hypridle-nolock (see bindings.conf): while present,
# dim + screen-off still fire but locking is skipped, so 1Password stays unlocked
# and long-running tasks keep going.

# 1m — battery: dim
listener {
    timeout = 60
    on-timeout = test "$(cat /sys/class/power_supply/AC0/online)" = 0 && { cur=$(brightnessctl -m|cut -d, -f4|tr -d %); brightnessctl -s set $cur%; for b in $(seq $((cur-1)) -1 10); do sleep 0.03; brightnessctl set $b%; done; }
    on-resume  = brightnessctl -r
}

# 5m — AC: dim | battery: screen off
listener {
    timeout = 300
    on-timeout = if test "$(cat /sys/class/power_supply/AC0/online)" = 1; then cur=$(brightnessctl -m|cut -d, -f4|tr -d %); brightnessctl -s set $cur%; for b in $(seq $((cur-1)) -1 10); do sleep 0.03; brightnessctl set $b%; done; else hyprctl dispatch dpms off; fi
    on-resume  = hyprctl dispatch dpms on; brightnessctl -r
}

# 10m — AC: screen off | battery: lock (unless paused)
listener {
    timeout = 600
    on-timeout = if test "$(cat /sys/class/power_supply/AC0/online)" = 1; then hyprctl dispatch dpms off; else test -e /tmp/hypridle-nolock || omarchy-system-lock; fi
    on-resume  = hyprctl dispatch dpms on
}

# 15m — AC: lock (unless paused)
listener {
    timeout = 900
    on-timeout = if test "$(cat /sys/class/power_supply/AC0/online)" = 1; then test -e /tmp/hypridle-nolock || omarchy-system-lock; fi
    on-resume  = omarchy-system-wake
}
